name: Build & deploy to GitHub Pages

# Run on every push to master (also support main, just in case GitHub renames
# the default branch). Allow manual runs from the Actions tab.
on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; new pushes cancel any waiting one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for the deck parser)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure base path
        # GitHub Pages project sites are served at /<repo>/, so set Vite's
        # base accordingly. User/org sites at the root work too because
        # ${{ github.event.repository.name }} == <repo>.
        run: echo "VITE_BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"

      - name: Build (parses MD then runs Vite)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
